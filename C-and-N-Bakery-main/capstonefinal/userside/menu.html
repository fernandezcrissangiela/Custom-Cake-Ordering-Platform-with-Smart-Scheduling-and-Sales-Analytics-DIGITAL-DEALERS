<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Our Sweet Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/menu.css">

  <style>
    /* Full-photo lightbox (only for the "click photo to see full photo" feature) */
    #modalImg { cursor: zoom-in; }
    .image-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 20000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .image-lightbox.active { display: flex; }
    .image-lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .image-lightbox .lightbox-close {
      position: absolute;
      top: 20px; right: 30px;
      color: #fff;
      font-size: 2.2rem;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>

  <header>
    <div class="container nav-flex">
      <a href="index.html" class="logo-text">C&N <span>Bakery</span></a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label"><span></span></label>

      <nav class="nav-links" id="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="cus.html">Customize Cake</a></li>
          <li><a href="faq.html">FAQ</a></li>
        </ul>
        <div class="auth-area">
          <div class="nav-icons">
            <div class="cart-wrapper">
              <i class="fas fa-shopping-cart" title="Cart" onclick="menuApp.checkAuth(event)"></i>
              <span id="cart-count-header">0</span>
            </div>
            <div class="user-wrapper">
              <i class="fas fa-user nav-user-icon" title="Account" onclick="menuApp.checkAuth(event)"></i>
            </div>
          </div>
          <span id="user-name-display"></span>
          <button id="signup-trigger" class="btn-primary" onclick="window.location.href='index.html'">Sign Up</button>
          <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="menu-header">
      <h1>Our <span>Sweet Menu</span></h1>
      <p class="subtitle">Freshly baked daily with love • Choose your favorites!</p>
    </div>

    <div class="filter-section">
      <div class="filter-box">
        <label><i class="fas fa-coins"></i> Budget Range:</label>
        <div class="price-range-buttons">
          <button class="price-filter-btn active" data-min="0" data-max="999999">Any</button>
          <button class="price-filter-btn" data-min="0" data-max="199">₱0 – ₱199</button>
          <button class="price-filter-btn" data-min="200" data-max="500">₱200 – ₱500</button>
          <button class="price-filter-btn" data-min="501" data-max="999999">₱501+</button>
        </div>
      </div>
    </div>

    <div class="categories" id="category-buttons">
      <span style="color:var(--muted);font-size:0.9rem;">
        <i class="fas fa-spinner fa-spin"></i> Loading categories…
      </span>
    </div>

    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">×</span>
      <img id="modalImg" src="" alt="Product" loading="lazy">
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <div id="modalSizeSelector" class="modal-size-selector" style="display:none;"></div>
        <button id="modalAddToCart" class="btn-primary full-width">Add to Cart</button>
      </div>
    </div>
  </div>

  <!-- Full-photo lightbox -->
  <div id="imageLightbox" class="image-lightbox">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" alt="Full photo">
  </div>

  <!-- Add-to-cart confirmation toast -->
  <div id="cartToast" class="cart-toast" style="position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:#2f2118; color:#fff; padding:12px 22px; border-radius:30px; font-family:'Poppins',sans-serif; font-size:0.92rem; box-shadow:0 8px 24px rgba(0,0,0,0.25); z-index:10000; opacity:0; pointer-events:none; transition:opacity 0.25s ease, transform 0.25s ease; display:flex; align-items:center; gap:8px;">
    <i class="fas fa-check-circle" style="color:#7fd88f;"></i>
    <span id="cartToastText">Added to cart!</span>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
    authDomain: "candn-bakery.firebaseapp.com",
    databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "candn-bakery",
    storageBucket: "candn-bakery.appspot.com",
    messagingSenderId: "620414447517",
    appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  // ============================================================
  // OOP: ENCAPSULATION
  // CartManager encapsulates all cart localStorage read/write and
  // the cart-count badge update. Private field #key hides the
  // storage key; no external code accesses localStorage directly.
  // ============================================================
  class CartManager { // OOP - Encapsulation
    #key = 'cart';

    getCart() {
      return JSON.parse(localStorage.getItem(this.#key) || '[]');
    }

    saveCart(cart) {
      localStorage.setItem(this.#key, JSON.stringify(cart));
      this.updateCount();
    }

    updateCount() {
      const countEl   = document.getElementById('cart-count-header');
      const isLoggedIn = !document.getElementById('logout-trigger').classList.contains('hidden');
      if (!countEl) return;
      if (!isLoggedIn) { countEl.textContent = '0'; countEl.style.display = 'none'; return; }
      const total = this.getCart().reduce((sum, item) => sum + (item.quantity || 1), 0);
      countEl.textContent  = total;
      countEl.style.display = total > 0 ? 'flex' : 'none';
    }

    addItem(product, categoryLabel) {
      const cart = this.getCart();
      // Drop the image before it ever touches storage — cart data gets synced
      // to Firebase, and duplicating (often base64) images across every cart
      // entry is what was filling up the database. The cart only needs the
      // product's text details.
      const { image, ...productWithoutImage } = product;
      const item = { ...productWithoutImage, category: categoryLabel, id: product.id || Date.now().toString() };
      const existing = cart.find(i => i.id === item.id);
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({ ...item, quantity: 1 });
      }
      this.saveCart(cart);
    }
  }

  // ============================================================
  // OOP: ABSTRACTION
  // ProductCard is an abstract base for a menu card.
  // It defines the shared interface: render() and getButtonLabel().
  // Concrete subclasses decide how they render differently.
  // ============================================================
  class ProductCard { // OOP - Abstraction (base class)
    constructor(product) {
      this.product = product;
    }

    // Whether this product has multiple sizes with different prices
    hasSizes() {
      return Array.isArray(this.product.sizes) && this.product.sizes.length > 0;
    }

    // Shared template — delegates to getButtonLabel() for flexibility
    render() { // OOP - Polymorphism (calls overridden getButtonLabel)
      const p = this.product;
      const priceLabel = this.hasSizes()
        ? `From ₱${Number(Math.min(...p.sizes.map(s => s.price))).toFixed(2)}`
        : `₱${Number(p.price).toFixed(2)}`;
      // Products with sizes require picking a size first, so the card
      // button opens the detail modal instead of adding directly to cart.
      const buttonAttrs = this.hasSizes()
        ? `class="btn-primary btn-choose-size" data-id="${p.id}"`
        : `class="btn-primary btn-add" data-id="${p.id}"`;
      const buttonText = this.hasSizes() ? 'Add to Cart' : this.getButtonLabel();
      return `
        <img src="${p.image || `https://via.placeholder.com/300x250?text=${encodeURIComponent(p.name)}`}"
             alt="${p.name}" loading="lazy">
        <h3>${p.name}</h3>
        <p class="card-desc">${p.description || "Freshly baked daily with love and the finest ingredients."}</p>
        <p class="price">${priceLabel}</p>
        <button ${buttonAttrs}>${buttonText}</button>`;
    }

    // Default label — subclasses override for different text
    getButtonLabel() { // OOP - Polymorphism (overridden by subclasses)
      return 'Add to Cart';
    }
  }

  // ============================================================
  // OOP: INHERITANCE + POLYMORPHISM
  // CakeCard inherits ProductCard and overrides getButtonLabel()
  // to show a cake-specific label.
  // ============================================================
  class CakeCard extends ProductCard { // OOP - Inheritance
    getButtonLabel() { // OOP - Polymorphism (overrides base)
      return ' Add to Cart';
    }
  }

  // ============================================================
  // OOP: INHERITANCE + POLYMORPHISM
  // PastryCard inherits ProductCard and overrides getButtonLabel()
  // to show a pastry-specific label.
  // ============================================================
  class PastryCard extends ProductCard { // OOP - Inheritance
    getButtonLabel() { // OOP - Polymorphism (overrides base)
      return ' Add to Cart';
    }
  }

  // ============================================================
  // OOP: ABSTRACTION — Factory function
  // createProductCard() hides which subclass to use. Callers only
  // pass a product and category; this function decides the type.
  // ============================================================
  function createProductCard(product, categoryKey) { // OOP - Abstraction (factory)
    if (categoryKey === 'cakes') return new CakeCard(product);   // OOP - Inheritance
    if (categoryKey === 'pastries') return new PastryCard(product); // OOP - Inheritance
    return new ProductCard(product); // base for unknown categories
  }

  // ============================================================
  // OOP: ENCAPSULATION
  // ProductModal encapsulates all modal open/close state and
  // the currently selected product. No external code reads
  // #currentProduct directly.
  // ============================================================
  class ProductModal { // OOP - Encapsulation
    #currentProduct = null;
    #selectedSize = null; // { label, price } when the product has sizes
    #el;

    constructor(modalId) {
      this.#el = document.getElementById(modalId);
      document.getElementById('closeModal').onclick = () => this.close();
    }

    open(product) {
      this.#currentProduct = product;
      const hasSizes = Array.isArray(product.sizes) && product.sizes.length > 0;
      this.#selectedSize = hasSizes ? product.sizes[0] : null;

      document.getElementById('modalImg').src   = product.image || `https://via.placeholder.com/420x300?text=${encodeURIComponent(product.name)}`;
      document.getElementById('modalImg').alt   = product.name;
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalDesc').textContent  = product.description || "Freshly baked daily with love and the finest ingredients.";

      const selectorEl = document.getElementById('modalSizeSelector');
      if (hasSizes) {
        selectorEl.style.display = 'flex';
        selectorEl.innerHTML = product.sizes.map((s, i) => `
          <label class="size-option${i === 0 ? ' selected' : ''}">
            <input type="radio" name="modal-size" value="${i}" ${i === 0 ? 'checked' : ''}>
            <span class="size-option-text">${s.label} — ₱${Number(s.price).toFixed(2)}</span>
          </label>`).join('');

        selectorEl.querySelectorAll('input[name="modal-size"]').forEach(input => {
          input.addEventListener('change', () => {
            const idx = Number(input.value);
            this.#selectedSize = product.sizes[idx];
            document.getElementById('modalPrice').textContent = `₱${Number(this.#selectedSize.price).toFixed(2)}`;
            selectorEl.querySelectorAll('.size-option').forEach((lbl, i) => {
              lbl.classList.toggle('selected', i === idx);
            });
          });
        });

        document.getElementById('modalPrice').textContent = `₱${Number(this.#selectedSize.price).toFixed(2)}`;
      } else {
        selectorEl.style.display = 'none';
        selectorEl.innerHTML = '';
        document.getElementById('modalPrice').textContent = `₱${Number(product.price).toFixed(2)}`;
      }

      this.#el.classList.add('active');
    }

    close() {
      this.#el.classList.remove('active');
      this.#currentProduct = null;
      this.#selectedSize = null;
    }

    // Returns the product to add to cart — merged with the chosen size
    // (price + a size-qualified id/name) when the product has sizes.
    getCurrentProduct() {
      if (!this.#currentProduct) return null;
      if (!this.#selectedSize) return this.#currentProduct;
      return {
        ...this.#currentProduct,
        price: this.#selectedSize.price,
        size: this.#selectedSize.label,
        name: `${this.#currentProduct.name} (${this.#selectedSize.label})`,
        id: `${this.#currentProduct.id}__${this.#selectedSize.label}`
      };
    }
  }

  // ============================================================
  // OOP: ENCAPSULATION
  // MenuApp encapsulates the entire page state: loaded products,
  // active category, price filter, and references to helper
  // objects. It coordinates CartManager, ProductModal, and
  // Firebase — callers just call init().
  // ============================================================
  class MenuApp { // OOP - Encapsulation
    #cartManager;
    #modal;
    #productsByCategory = {};
    #allCategories = [];
    #grid;

    constructor() {
      this.#cartManager = new CartManager();       // OOP - Encapsulation
      this.#modal       = new ProductModal('productModal'); // OOP - Encapsulation
      this.#grid        = document.getElementById('product-grid');
    }

    // ── Auth helpers (abstracted so the rest of the class
    //    never touches Firebase auth directly)
    checkAuth(e) { // OOP - Abstraction (hides auth check logic)
      const isLoggedIn = !document.getElementById('logout-trigger').classList.contains('hidden');
      if (!isLoggedIn) { alert("Please sign in to continue."); window.location.href = 'index.html'; return; }
      const target = e.currentTarget;
      if (target.classList.contains('fa-shopping-cart')) window.location.href = 'cart.html';
      else if (target.classList.contains('fa-user')) window.location.href = 'user.html';
    }

    showLoggedIn(name) {
      document.getElementById('signup-trigger')?.classList.add('hidden');
      document.getElementById('logout-trigger')?.classList.remove('hidden');
      const nameTag = document.getElementById('user-name-display');
      if (nameTag) nameTag.innerText = "Hi, " + (name || "Guest");
      this.#cartManager.updateCount();
    }

    showLoggedOut() {
      document.getElementById('signup-trigger')?.classList.remove('hidden');
      document.getElementById('logout-trigger')?.classList.add('hidden');
      const nameTag = document.getElementById('user-name-display');
      if (nameTag) nameTag.innerText = "";
      this.#cartManager.updateCount();
    }

    // ── Add to cart (delegates to CartManager)
    addToCart(product) { // OOP - Abstraction (caller doesn't manage cart details)
      if (!auth.currentUser) {
        alert("Please sign in to add items to your cart.");
        window.location.href = 'index.html';
        return;
      }
      const catObj = this.#allCategories.find(c => c.key === product.category);
      const label  = catObj ? catObj.displayName : (product.category || "Others");
      this.#cartManager.addItem(product, label); // OOP - Encapsulation

      // The cart id for a sized item is "<baseId>__<size label>" — strip the
      // size suffix so we can still flash the matching card button, whether
      // it's the plain "Add to Cart" (.btn-add) or "Choose Size" (.btn-choose-size).
      const baseId = String(product.id).split('__')[0];
      document.querySelectorAll(`.btn-add[data-id="${baseId}"], .btn-choose-size[data-id="${baseId}"]`).forEach(btn => {
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Added';
        btn.disabled = true;
        setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 1400);
      });

      this.#showCartToast(`${product.name} added to cart!`);
    }

    // Always-visible confirmation, since the modal (used for sized products)
    // closes immediately and wouldn't otherwise give the user any feedback.
    #showCartToast(message) { // OOP - Encapsulation (private method)
      const toast = document.getElementById('cartToast');
      if (!toast) return;
      document.getElementById('cartToastText').textContent = message;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
      clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(20px)';
      }, 2000);
    }

    // ── Rendering
    #showSkeletons(count = 8) { // OOP - Encapsulation (private method)
      this.#grid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        this.#grid.innerHTML += `
          <div class="cake-item skeleton">
            <div class="skeleton-img"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text" style="width:65%"></div>
            <div class="skeleton-btn"></div>
          </div>`;
      }
    }

    #renderProducts(categoryKey) { // OOP - Encapsulation (private method)
      const activePriceBtn = document.querySelector('.price-filter-btn.active');
      const minPrice = parseFloat(activePriceBtn?.dataset.min || 0);
      const maxPrice = parseFloat(activePriceBtn?.dataset.max || Infinity);

      // Products with per-size pricing have no top-level `price` field, so
      // fall back to their cheapest size when checking the price filter.
      // (Without this, sized products always fail `undefined >= minPrice`
      // and get filtered out of the grid entirely — even under "Any".)
      const getEffectivePrice = p =>
        Array.isArray(p.sizes) && p.sizes.length > 0
          ? Math.min(...p.sizes.map(s => s.price))
          : p.price;

      const items = (this.#productsByCategory[categoryKey] || []).filter(p => {
        const price = getEffectivePrice(p);
        return price >= minPrice && price <= maxPrice;
      });

      this.#grid.innerHTML = items.length === 0
        ? '<p class="no-products">No products found in this price range.</p>'
        : '';

      items.forEach(p => {
        const card = document.createElement('div');
        card.className = 'cake-item';
        const cardObj = createProductCard(p, categoryKey); // OOP - Abstraction + Polymorphism
        card.innerHTML = cardObj.render();                 // OOP - Polymorphism
        card.addEventListener('click', e => {
          if (!e.target.closest('button')) this.#modal.open(p); // OOP - Encapsulation
        });
        this.#grid.appendChild(card);
      });
    }

    async #fetchCategory(categoryKey) { // OOP - Encapsulation (private method)
      this.#showSkeletons();
      try {
        const snap = await get(ref(db, `products/${categoryKey}`));
        this.#productsByCategory[categoryKey] = snap.exists()
          ? Object.entries(snap.val()).map(([id, val]) => ({ id, ...val, category: categoryKey }))
          : [];
        this.#renderProducts(categoryKey);
      } catch (err) {
        this.#grid.innerHTML = `<p class="error-msg">Failed to load ${categoryKey}: ${err.message}</p>`;
      }
    }

    async #loadCategories() { // OOP - Encapsulation (private method)
      const btnContainer = document.getElementById('category-buttons');
      try {
        const snap = await get(ref(db, 'categories'));
        this.#allCategories = [];
        if (snap.exists()) {
          snap.forEach(child => {
            this.#allCategories.push({ key: child.key, displayName: child.val().displayName || child.key });
          });
        }

        if (this.#allCategories.length === 0) {
          btnContainer.innerHTML = '<span style="color:var(--muted);">No categories available.</span>';
          return;
        }

        btnContainer.innerHTML = '';
        this.#allCategories.forEach((cat, i) => {
          const btn = document.createElement('button');
          btn.className = 'category-btn' + (i === 0 ? ' active' : '');
          btn.dataset.category = cat.key;
          btn.textContent = cat.displayName;
          btn.addEventListener('click', () => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.#fetchCategory(cat.key);
          });
          btnContainer.appendChild(btn);
        });

        this.#fetchCategory(this.#allCategories[0].key);
      } catch (err) {
        btnContainer.innerHTML = `<span style="color:#c0392b;">Failed to load categories: ${err.message}</span>`;
      }
    }

    // ── Wire up price filter buttons
    #bindPriceFilters() { // OOP - Encapsulation (private method)
      document.querySelectorAll('.price-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.price-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const activeCat = document.querySelector('.category-btn.active')?.dataset.category;
          if (activeCat) this.#renderProducts(activeCat);
        });
      });
    }

    // ── Wire up grid click delegation for Add to Cart buttons
    #bindGridClicks() { // OOP - Encapsulation (private method)
      this.#grid.addEventListener('click', e => {
        const activeCat = document.querySelector('.category-btn.active')?.dataset.category;

        const chooseBtn = e.target.closest('.btn-choose-size');
        if (chooseBtn) {
          e.stopPropagation();
          const product = this.#productsByCategory[activeCat]?.find(p => p.id === chooseBtn.dataset.id);
          if (product) this.#modal.open(product); // let them pick a size in the modal
          return;
        }

        const btn = e.target.closest('.btn-add');
        if (!btn) return;
        e.stopPropagation();
        const id      = btn.dataset.id;
        const product = this.#productsByCategory[activeCat]?.find(p => p.id === id);
        if (product) this.addToCart(product); // OOP - Abstraction
      });
    }

    // ── Wire up the modal "Add to Cart" button
    #bindModalCart() { // OOP - Encapsulation (private method)
      document.getElementById('modalAddToCart').onclick = () => {
        const product = this.#modal.getCurrentProduct(); // OOP - Encapsulation
        if (product) this.addToCart(product);
        this.#modal.close();
      };
    }

    // ── Wire up clicking the product photo to view it full-size
    #bindImageLightbox() { // OOP - Encapsulation (private method)
      const modalImg = document.getElementById('modalImg');
      const lightbox = document.getElementById('imageLightbox');
      const lightboxImg = document.getElementById('lightboxImg');

      modalImg.addEventListener('click', e => {
        e.stopPropagation();
        lightboxImg.src = modalImg.src;
        lightboxImg.alt = modalImg.alt;
        lightbox.classList.add('active');
      });

      lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
      });
    }

    // ── Public initializer — single entry point
    async init() { // OOP - Abstraction (hides all setup complexity behind one call)
      this.#bindPriceFilters();
      this.#bindGridClicks();
      this.#bindModalCart();
      this.#bindImageLightbox();
      await this.#loadCategories();
    }
  }

  // ============================================================
  // INSTANTIATE & boot
  // ============================================================
  const menuApp = new MenuApp(); // OOP - Encapsulation
  window.menuApp = menuApp; // expose for inline onclick in HTML

  menuApp.init(); // OOP - Abstraction

  // ── Auth state listener
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const snap = await get(ref(db, "users/" + user.uid));
        menuApp.showLoggedIn(snap.exists() ? snap.val().name : null);
      } catch { menuApp.showLoggedIn(null); }
    } else {
      menuApp.showLoggedOut();
    }
  });

  window.handleLogout = () => signOut(auth).catch(err => console.error("Logout error:", err));
</script>
</body>
</html>
