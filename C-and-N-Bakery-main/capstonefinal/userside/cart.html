<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Cart - C&N Bakery</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/cart.css" />
    <style>
        /* ─── Cart Badge Styles ─── */
        .cart-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .cart-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            line-height: 18px;
            border-radius: 50%;
            text-align: center;
            padding: 0 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .cart-badge.hidden {
            display: none;
        }

        /* ─── Cart items no longer show a product photo (keeps DB storage
               small — cart data is synced to Firebase per user) ─── */
        .cart-item-no-image {
            display: flex;
        }
        .cart-item-no-image .item-details {
            width: 100%;
        }

        /* ─── Mobile Sticky Checkout Bar ─── */
        #mobile-checkout-bar {
            display: none;
        }
        @media (max-width: 850px) {
            body { padding-bottom: 88px; }
            #mobile-checkout-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 1100;
                background: #fff;
                border-top: 2px solid var(--beige);
                box-shadow: 0 -4px 20px rgba(103,72,49,0.13);
                padding: 12px 18px;
                gap: 14px;
            }
            #mobile-checkout-bar .mob-total {
                display: flex;
                flex-direction: column;
                line-height: 1.3;
                min-width: 0;
            }
            #mobile-checkout-bar .mob-total .mob-label {
                font-size: 0.72rem;
                color: var(--text-light);
                white-space: nowrap;
            }
            #mobile-checkout-bar .mob-total .mob-price {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--primary-dark);
            }
            #mobile-checkout-bar .mob-btn {
                flex-shrink: 0;
                padding: 13px 22px;
                background: linear-gradient(135deg, var(--btn-dark-start), var(--btn-dark-end));
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 0.95rem;
                font-weight: 600;
                font-family: 'Poppins', sans-serif;
                cursor: pointer;
                box-shadow: 0 6px 18px rgba(90,60,40,0.30);
                transition: all 0.3s ease;
                white-space: nowrap;
            }
            #mobile-checkout-bar .mob-btn:active {
                transform: scale(0.97);
            }
            #mobile-checkout-bar .mob-btn:disabled {
                background: #c8b8a8;
                box-shadow: none;
                cursor: not-allowed;
            }
        }
    </style>
</head>
<body>

    <!-- ─── HEADER ─── -->
    <header>
        <div class="container nav-flex">
            <a href="index.html" class="logo-text">C&N <span>Bakery</span></a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label"><span></span></label>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="cus.html">Customize Cake</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    
                </ul>

                <div class="auth-area">
                    <div class="nav-icons">
                        <div class="cart-wrapper" onclick="location.href='cart.html'">
                            <i class="fas fa-shopping-cart"></i>
                            <span id="cart-count-header" style="display:none;">0</span>
                        </div>
                        <div class="user-wrapper" onclick="location.href='user.html'">
                            <i class="fas fa-user-circle" style="color: var(--primary);"></i>
                        </div>
                    </div>
                    <span id="user-name-display"></span>
                    <button class="btn-outline" onclick="handleLogout()">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ─── PAGE CONTENT ─── -->
    <div class="container">
        <h1 class="page-title">Your <span>Sweet Cart</span></h1>
        <div class="cart-container">
            <div id="cart-grid-wrapper" class="cart-grid"></div>
        </div>
    </div>

    <!-- ─── MOBILE STICKY CHECKOUT BAR ─── -->
    <div id="mobile-checkout-bar">
        <div class="mob-total">
            <span class="mob-label" id="mob-selected-label">0 items selected</span>
            <span class="mob-price" id="mob-total-price">₱0.00</span>
        </div>
        <button class="mob-btn" id="mob-checkout-btn" disabled onclick="proceedToCheckout()">
            Checkout
        </button>
    </div>

    <!-- ─── CART LOGIC (unchanged) ─── -->
    <script>
        const gridWrapper = document.getElementById('cart-grid-wrapper');
        const countBadge  = document.getElementById('cart-count-header');

        let selectedIndices = [];

        // Flag: has the page already loaded & reconciled the cart from Firebase?
        // Once true, we never let Firebase overwrite local changes (deletions, checkouts).
        let cartSyncedFromFirebase = false;

        function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }

        // saveCart always writes localStorage + header, and calls Firebase sync if available
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateHeaderCount();
            if (window._firebaseSaveCart) window._firebaseSaveCart(cart);
        }

        function updateHeaderCount() {
            const cart = getCart();
            const count = cart.length; // Show number of unique items, not total quantity
            if (!countBadge) return;
            if (count > 0) {
                countBadge.textContent = count;
                countBadge.style.display = 'flex';
            } else {
                countBadge.style.display = 'none';
            }
        }

        function updateMobileBar(count, subtotal) {
            const bar = document.getElementById('mobile-checkout-bar');
            const btn = document.getElementById('mob-checkout-btn');
            const label = document.getElementById('mob-selected-label');
            const price = document.getElementById('mob-total-price');
            if (!bar) return;
            label.textContent = count + ' item' + (count !== 1 ? 's' : '') + ' selected';
            price.textContent = '₱' + subtotal.toLocaleString(undefined, {minimumFractionDigits: 2});
            btn.disabled = count === 0;
        }

        function toggleSelect(index) {
            const pos = selectedIndices.indexOf(index);
            if (pos > -1) selectedIndices.splice(pos, 1);
            else selectedIndices.push(index);
            renderCart(false);
        }

        function renderCart(resetSelection = true) {
            const cart = getCart();
            gridWrapper.innerHTML = '';

            if (resetSelection) selectedIndices = [];

            if (cart.length === 0) {
                gridWrapper.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-cookie-bite"></i>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything yet.</p>
                        <button class="btn-primary" onclick="location.href='menu.html'" style="width:auto; padding:13px 40px;">Browse Menu</button>
                    </div>`;
                updateMobileBar(0, 0);
                return;
            }

            const itemsList = document.createElement('div');
            itemsList.className = 'cart-items-list';
            let selectedSubtotal = 0;

            cart.forEach((item, index) => {
                const isChecked = selectedIndices.includes(index);
                const itemTotal = (item.price || 0) * (item.quantity || 1);
                if (isChecked) selectedSubtotal += itemTotal;

                const wrapper = document.createElement('div');
                wrapper.className = 'cart-item-wrapper';
                wrapper.innerHTML = `
                    <input type="checkbox" class="item-checkbox" ${isChecked ? 'checked' : ''} onchange="toggleSelect(${index})">
                    <div class="cart-item cart-item-no-image">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            ${item.customDetails
                                ? `<p class="custom-info">🍰 ${item.customDetails.flavor} | 🍦 ${item.customDetails.frosting}</p>`
                                : (item.description ? `<p class="custom-info">${item.description.substring(0, 80)}${item.description.length > 80 ? '…' : ''}</p>` : '')}
                            <div class="price-row">
                                <div class="price">₱${Number(itemTotal).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                <div class="quantity-controls">
                                    <button onclick="changeQuantity(${index}, -1)">−</button>
                                    <span>${item.quantity || 1}</span>
                                    <button onclick="changeQuantity(${index}, 1)">+</button>
                                </div>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${index})">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>`;
                itemsList.appendChild(wrapper);
            });

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'cart-summary';
            summaryDiv.innerHTML = `
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Selected Items</span>
                    <span>${selectedIndices.length}</span>
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>₱${selectedSubtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total Amount</span>
                    <span>₱${selectedSubtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                <button class="btn-primary"
                        ${selectedIndices.length === 0 ? 'disabled' : ''}
                        onclick="proceedToCheckout()">
                    Proceed to Checkout (${selectedIndices.length})
                </button>
                <p class="summary-note">
                    ${selectedIndices.length === 0 ? 'Please select items to checkout' : 'Shipping calculated at next step'}
                </p>
            `;

            gridWrapper.appendChild(itemsList);
            gridWrapper.appendChild(summaryDiv);

            // Update mobile sticky bar
            updateMobileBar(selectedIndices.length, selectedSubtotal);
        }

        window.changeQuantity = function(index, delta) {
            let cart = getCart();
            cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + delta);
            saveCart(cart);
            renderCart(false);
        };

        window.removeItem = function(index) {
            let cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart(true);
        };

        window.proceedToCheckout = function() {
            const cart = getCart();
            const itemsToBuy = selectedIndices.map(index => {
                const item = cart[index];
                return {
                    name:            item.name,
                    price:           item.price,
                    quantity:        item.quantity,
                    description:     item.description    || '',
                    category:        item.category       || '',
                    customDetails:   item.customDetails  || null,
                    layers:          item.layers         || '',
                    tiers:           item.tiers           || [],
                    flavor:          item.flavor         || '',
                    frosting:        item.frosting       || '',
                    design:          item.design         || '',
                    message:         item.message        || '',
                    notes:           item.notes          || '',
                    referencePhoto:  item.referencePhoto || ''
                };
            });

            // ── DO NOT remove items from the cart here ──
            // Items stay in the cart until the order is fully placed.
            // The checkout page is responsible for clearing them on success.
            // This prevents items from disappearing if the user goes back
            // or closes the page before completing the order.

            try {
                localStorage.removeItem('checkoutItems');
                localStorage.setItem('checkoutItems', JSON.stringify(itemsToBuy));
                window.location.href = 'checkout.html';
            } catch (error) {
                console.error("Storage Error:", error);
                const minimalItems = selectedIndices.map(index => ({
                    name: cart[index].name,
                    price: cart[index].price,
                    quantity: cart[index].quantity
                }));
                localStorage.setItem('checkoutItems', JSON.stringify(minimalItems));
                window.location.href = 'checkout.html';
            }
        };

        renderCart();
        updateHeaderCount();
    </script>    <!-- ─── FIREBASE AUTH (user name + logout) ─── -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
            authDomain: "candn-bakery.firebaseapp.com",
            databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "candn-bakery"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ── Cart sync helpers ──
        let currentFirebaseUser = null;

        function saveCartToFirebase(user, cart) {
            set(ref(db, `carts/${user.uid}`), cart.length > 0 ? cart : null).catch(console.error);
        }

        // Expose Firebase save so saveCart() (defined in the first script) can call it
        window._firebaseSaveCart = function(cart) {
            if (currentFirebaseUser) saveCartToFirebase(currentFirebaseUser, cart);
        };

        function initialCartSync(user, cloudCart) {
            // Only run once on page load — NEVER after the user has already
            // made changes (delete, checkout) because that would restore items.
            if (cartSyncedFromFirebase) return;
            cartSyncedFromFirebase = true;

            const localCart = JSON.parse(localStorage.getItem('cart') || '[]');

            if (localCart.length === 0 && cloudCart.length > 0) {
                // Fresh page load with nothing local — restore from cloud
                localStorage.setItem('cart', JSON.stringify(cloudCart));
                renderCart();
                updateHeaderCount();
            } else if (localCart.length > 0 && cloudCart.length === 0) {
                // Local exists but cloud is empty — push to cloud
                saveCartToFirebase(user, localCart);
            } else if (localCart.length > 0 && cloudCart.length > 0) {
                // Both exist — add any cloud-only items that aren't in local
                // (handles "added on another device" case without overwriting deletions)
                const merged = [...localCart];
                cloudCart.forEach(cloudItem => {
                    const exists = merged.find(l =>
                        l.name === cloudItem.name &&
                        JSON.stringify(l.customDetails) === JSON.stringify(cloudItem.customDetails)
                    );
                    if (!exists) merged.push(cloudItem);
                });
                if (merged.length !== localCart.length) {
                    localStorage.setItem('cart', JSON.stringify(merged));
                    saveCartToFirebase(user, merged);
                    renderCart();
                    updateHeaderCount();
                }
                // If nothing new was added, don't re-render (avoids flicker)
            }
            // If both are empty, nothing to do
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentFirebaseUser = user;

                get(ref(db, 'users/' + user.uid)).then(snap => {
                    if (snap.exists()) {
                        document.getElementById('user-name-display').textContent = "Hi, " + snap.val().name;
                    }
                });

                // One-time sync on page load
                get(ref(db, `carts/${user.uid}`)).then(snap => {
                    const cloudCart = snap.exists() ? snap.val() : [];
                    initialCartSync(user, Array.isArray(cloudCart) ? cloudCart : []);
                });
            }
        });

        window.handleLogout = () => {
            // Save cart to Firebase before logging out, then clear local
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (currentFirebaseUser && cart.length > 0) {
                saveCartToFirebase(currentFirebaseUser, cart);
            }
            signOut(auth).then(() => {
                localStorage.removeItem('cart');
                window.location.href = "index.html";
            });
        };
    </script>

</body>
</html>
