<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Cart - C&N Bakery</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/cart.css" />
</head>
<body>

    <!-- ─── HEADER ─── -->
    <header>
        <div class="container nav-flex">
            <a href="index.html" class="logo-text">C&N <span>Bakery</span></a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label"><span></span></label>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="index.html#faq">FAQ</a></li>
                </ul>

                <div class="auth-area">
                    <div class="nav-icons">
                        <div class="cart-wrapper" onclick="location.href='cart.html'">
                            <i class="fas fa-shopping-cart"></i>
                            <span id="cart-count-header" style="display:none;">0</span>
                        </div>
                        <div class="user-wrapper" onclick="location.href='user.html'">
                            <i class="fas fa-user-circle" style="color: var(--primary);"></i>
                        </div>
                    </div>
                    <span id="user-name-display"></span>
                    <button class="btn-outline" onclick="handleLogout()">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ─── PAGE CONTENT ─── -->
    <div class="container">
        <h1 class="page-title">Your <span>Sweet Cart</span></h1>
        <div class="cart-container">
            <div id="cart-grid-wrapper" class="cart-grid"></div>
        </div>
    </div>

    <!-- ─── CART LOGIC (unchanged) ─── -->
    <script>
        const gridWrapper = document.getElementById('cart-grid-wrapper');
        const countBadge  = document.getElementById('cart-count-header');

        let selectedIndices = [];

        function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
        function saveCart(cart) { (window._saveCartSync || (c => { localStorage.setItem('cart', JSON.stringify(c)); updateHeaderCount(); }))(cart); }

        function updateHeaderCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
            if (!countBadge) return;
            if (count > 0) {
                countBadge.textContent = count;
                countBadge.style.display = 'flex';
            } else {
                countBadge.style.display = 'none';
            }
        }

        function toggleSelect(index) {
            const pos = selectedIndices.indexOf(index);
            if (pos > -1) selectedIndices.splice(pos, 1);
            else selectedIndices.push(index);
            renderCart(false);
        }

        function renderCart(resetSelection = true) {
            const cart = getCart();
            gridWrapper.innerHTML = '';

            if (resetSelection) selectedIndices = [];

            if (cart.length === 0) {
                gridWrapper.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-cookie-bite"></i>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything yet.</p>
                        <button class="btn-primary" onclick="location.href='menu.html'" style="width:auto; padding:13px 40px;">Browse Menu</button>
                    </div>`;
                return;
            }

            const itemsList = document.createElement('div');
            itemsList.className = 'cart-items-list';
            let selectedSubtotal = 0;

            cart.forEach((item, index) => {
                const isChecked = selectedIndices.includes(index);
                const itemTotal = (item.price || 0) * (item.quantity || 1);
                if (isChecked) selectedSubtotal += itemTotal;

                const wrapper = document.createElement('div');
                wrapper.className = 'cart-item-wrapper';
                wrapper.innerHTML = `
                    <input type="checkbox" class="item-checkbox" ${isChecked ? 'checked' : ''} onchange="toggleSelect(${index})">
                    <div class="cart-item">
                        <img src="${item.image || 'https://via.placeholder.com/110?text=Cake'}" alt="${item.name}">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            ${item.customDetails
                                ? `<p class="custom-info">🍰 ${item.customDetails.flavor} | 🍦 ${item.customDetails.frosting}</p>`
                                : (item.description ? `<p class="custom-info">${item.description.substring(0, 80)}${item.description.length > 80 ? '…' : ''}</p>` : '')}
                            <div class="price-row">
                                <div class="price">₱${Number(itemTotal).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                <div class="quantity-controls">
                                    <button onclick="changeQuantity(${index}, -1)">−</button>
                                    <span>${item.quantity || 1}</span>
                                    <button onclick="changeQuantity(${index}, 1)">+</button>
                                </div>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${index})">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>`;
                itemsList.appendChild(wrapper);
            });

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'cart-summary';
            summaryDiv.innerHTML = `
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Selected Items</span>
                    <span>${selectedIndices.length}</span>
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>₱${selectedSubtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total Amount</span>
                    <span>₱${selectedSubtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                <button class="btn-primary"
                        ${selectedIndices.length === 0 ? 'disabled' : ''}
                        onclick="proceedToCheckout()">
                    Proceed to Checkout (${selectedIndices.length})
                </button>
                <p class="summary-note">
                    ${selectedIndices.length === 0 ? 'Please select items to checkout' : 'Shipping calculated at next step'}
                </p>
            `;

            gridWrapper.appendChild(itemsList);
            gridWrapper.appendChild(summaryDiv);
        }

        window.changeQuantity = function(index, delta) {
            let cart = getCart();
            cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + delta);
            saveCart(cart);
            renderCart(false);
        };

        window.removeItem = function(index) {
            let cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart(true);
        };

        window.proceedToCheckout = function() {
            const cart = getCart();
            const itemsToBuy = selectedIndices.map(index => {
                const item = cart[index];
                return {
                    name:            item.name,
                    price:           item.price,
                    quantity:        item.quantity,
                    image:           item.image || 'https://via.placeholder.com/110?text=Bakery+Item',
                    description:     item.description    || '',
                    category:        item.category       || '',
                    customDetails:   item.customDetails  || null,
                    // Preserve custom cake fields directly so they survive checkout → Firebase
                    layers:          item.layers         || '',
                    flavor:          item.flavor         || '',
                    frosting:        item.frosting       || '',
                    design:          item.design         || '',
                    message:         item.message        || '',
                    notes:           item.notes          || '',
                    referencePhoto:  item.referencePhoto || ''
                };
            });

            // Remove only the checked-out items from the cart before navigating
            const remainingCart = cart.filter((_, index) => !selectedIndices.includes(index));
            saveCart(remainingCart);

            try {
                localStorage.removeItem('checkoutItems');
                localStorage.setItem('checkoutItems', JSON.stringify(itemsToBuy));
                window.location.href = 'checkout.html';
            } catch (error) {
                console.error("Storage Error:", error);
                const minimalItems = selectedIndices.map(index => ({
                    name: cart[index].name,
                    price: cart[index].price,
                    quantity: cart[index].quantity
                }));
                localStorage.setItem('checkoutItems', JSON.stringify(minimalItems));
                window.location.href = 'checkout.html';
            }
        };

        renderCart();
        updateHeaderCount();
    </script>    <!-- ─── FIREBASE AUTH (user name + logout) ─── -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
            authDomain: "candn-bakery.firebaseapp.com",
            databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "candn-bakery"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ── Cart sync helpers ──
        function saveCartToFirebase(user, cart) {
            set(ref(db, `carts/${user.uid}`), cart.length > 0 ? cart : null).catch(console.error);
        }

        function mergeAndSaveCart(user, cloudCart) {
            const localCart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (localCart.length === 0) {
                // No local items — restore from cloud
                localStorage.setItem('cart', JSON.stringify(cloudCart));
                renderCart();
                updateHeaderCount();
            } else if (cloudCart.length === 0) {
                // No cloud items — push local to cloud
                saveCartToFirebase(user, localCart);
            } else {
                // Merge: combine cloud + local, deduplicate by name
                const merged = [...cloudCart];
                localCart.forEach(localItem => {
                    const exists = merged.find(c => c.name === localItem.name && JSON.stringify(c.customDetails) === JSON.stringify(localItem.customDetails));
                    if (!exists) merged.push(localItem);
                });
                localStorage.setItem('cart', JSON.stringify(merged));
                saveCartToFirebase(user, merged);
                renderCart();
                updateHeaderCount();
            }
        }

        // Patch saveCart to also sync to Firebase
        const _originalSaveCart = window.saveCart || null;
        let currentFirebaseUser = null;

        function saveCartWithSync(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateHeaderCount();
            if (currentFirebaseUser) saveCartToFirebase(currentFirebaseUser, cart);
        }

        // Override the global saveCart used by changeQuantity / removeItem
        window._saveCartSync = saveCartWithSync;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentFirebaseUser = user;

                get(ref(db, 'users/' + user.uid)).then(snap => {
                    if (snap.exists()) {
                        document.getElementById('user-name-display').textContent = "Hi, " + snap.val().name;
                    }
                });

                // Restore cart from Firebase on login
                get(ref(db, `carts/${user.uid}`)).then(snap => {
                    const cloudCart = snap.exists() ? snap.val() : [];
                    mergeAndSaveCart(user, Array.isArray(cloudCart) ? cloudCart : []);
                });
            }
        });

        window.handleLogout = () => {
            // Save cart to Firebase before logging out, then clear local
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (currentFirebaseUser && cart.length > 0) {
                saveCartToFirebase(currentFirebaseUser, cart);
            }
            signOut(auth).then(() => {
                localStorage.removeItem('cart');
                window.location.href = "index.html";
            });
        };
    </script>

</body>
</html>
